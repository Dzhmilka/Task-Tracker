<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracking</title>
    <link href="popup.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section> 
        <form id="task-input-form" class="task-input-form">
            <label class="task-input-label" for="task-input"><h3>Task name</h3></label>
            <div class="task-input-container">
                <input id="task-input" placeholder="Bugfix #1" class="task-input" type="text">
                <button class="task-start" id="task-start" type="submit">Start</button>
            </div>
        </form>
    </section>

    <hr class="divider">

    <section class="active-task-section">
        <div class="active-task-info" id="active-task-info">
            <h2 id="active-task-name"></h2>
            <time id="active-task-time"></time>
        </div>
        <div class="active-task-actions" id="active-task-actions">
            <button class="task-pause" id="task-pause">Pause</button>
            <button class="task-discard" id="task-discard" style="display: none;">Discard</button>
            <button class="task-save" id="task-save" style="display: none;">Save</button>
            <button class="task-resume" id="task-resume" style="display: none;">Resume</button>
        </div>
        
        <p id="no-active-task" style="display: none; margin: auto;">No active tasks</p>
    </section>

    <hr class="divider">

    <section>
        <h2 class="history-title">History</h2>
        <div id="history-container">
            <p class="history-empty" id="history-empty">Empty</p>
        </div>
    </section>
    <script src="popup.js"></script>
</body>
</html>
